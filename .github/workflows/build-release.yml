name: Build and Release

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        target:
          - distro: debian
            release: trixie
          - distro: debian
            release: testing
          - distro: debian
            release: sid
        arch: [x86-64, arm64]
        include:
          - arch: x86-64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Print kernel version
        run: uname -rs

      - name: Set up mkosi
        uses: systemd/mkosi@main

      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: mkosi -d ${{ matrix.target.distro }} -r ${{ matrix.target.release }}

      - name: Generate checksum file
        run: for f in *.*; do sha256sum $f > $f.sha256; done
        working-directory: mkosi.output

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.distro }}-${{ matrix.target.release }}_${{ matrix.arch }}
          path: mkosi.output/*.*
          if-no-files-found: error
          retention-days: 1
